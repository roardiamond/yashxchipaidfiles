<!DOCTYPE html>
<html>
<head>
<title>YashXChi</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#020617,#0f172a);
color:white;
text-align:center;
}

header{
font-size:35px;
padding:30px;
font-weight:bold;
}

.banner{
width:100%;
max-height:250px;
object-fit:cover;
}

.games{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:30px;
margin-top:40px;
}

.card{
background:#1e293b;
padding:30px;
width:220px;
border-radius:12px;
cursor:pointer;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
background:#334155;
}

.popupbg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
display:flex;
justify-content:center;
align-items:center;
z-index:1000;
}

.popup{
background:white;
color:black;
padding:30px;
border-radius:10px;
text-align:center;
width:300px;
}

button{
padding:10px 20px;
border:none;
border-radius:6px;
cursor:pointer;
}

.ytbtn{
background:red;
color:white;
}

</style>

</head>

<body>

<img src="banner.jpg" class="banner">

<header>YashXChi</header>

<h2>Select Your Game</h2>

<div class="games">

<div class="card" onclick="openPage('ff.html')">
<h2>Free Fire Max</h2>
</div>

<div class="card" onclick="openPage('bgmi.html')">
<h2>BGMI</h2>
</div>

<div class="card" onclick="openPage('minecraft.html')">
<h2>Minecraft</h2>
</div>

<div class="card" onclick="openPage('comingsoon.html')">
<h2>Coming Soon</h2>
</div>

</div>

<div id="popup" class="popupbg">

<div class="popup">

<h2>Subscribe Our Channel</h2>

<p>Support YashXChi on YouTube</p>

<button class="ytbtn" onclick="yt()">Open YouTube</button>

<br><br>

<button onclick="closePopup()">Close</button>

</div>

</div>

<script>

function openPage(page){
window.location.href = page;
}

function yt(){
window.location.href="https://www.youtube.com/@YASHXCHI98";
}

function closePopup(){
document.getElementById("popup").style.display="none";
}

</script>

</body>
</html>S
</html>
